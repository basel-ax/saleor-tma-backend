# Phase 9: CI/CD Pipeline for Cloudflare Workers
# Runs on push to main and pull requests
# See: task/phase-9-improve-code.md

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "18"

jobs:
  # ============================================================
  # Lint and Type Check
  # ============================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm ci

      - name: TypeScript type check
        working-directory: worker
        run: npm run build

  # ============================================================
  # Unit Tests
  # ============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm ci

      - name: Run tests
        working-directory: worker
        run: npm test

  # ============================================================
  # Contract Tests (against local worker)
  # ============================================================
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm ci

      - name: Install Wrangler
        working-directory: worker
        run: npm install -g wrangler

      - name: Start worker in background
        working-directory: worker
        run: |
          npx wrangler dev --port 8787 &
          sleep 10

      - name: Run contract tests
        working-directory: worker
        env:
          SPEC_KIT_BASE_URL: http://localhost:8787
        run: npm test

  # ============================================================
  # Deploy to Staging (on main branch push)
  # ============================================================
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [contract-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm ci

      - name: Install Wrangler
        working-directory: worker
        run: npm install -g wrangler

      - name: Deploy to Staging
        working-directory: worker
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          SALEOR_API_URL: ${{ secrets.SALEOR_API_URL }}
          SALEOR_TOKEN: ${{ secrets.SALEOR_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: npx wrangler deploy --env dev

      - name: Verify Staging Deployment
        run: |
          # Wait for deployment to propagate
          sleep 5
          # Test staging endpoint (replace with actual URL)
          curl -f https://tma-graphql-worker.staging.workers.dev/graphql \
            -H "Content-Type: application/json" \
            -H "X-Telegram-Init-Data: auth_date=1700000000&hash=test&user={\"id\":\"123\"}" \
            -d '{"query":"{ restaurants { id name } }"}' \
            || echo "Staging deployment verification skipped"

  # ============================================================
  # Deploy to Production (manual approval required)
  # ============================================================
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    secrets:
      CF_ACCOUNT_ID:
        required: true
      CF_API_TOKEN:
        required: true
      SALEOR_API_URL:
        required: true
      SALEOR_TOKEN:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm ci

      - name: Install Wrangler
        working-directory: worker
        run: npm install -g wrangler

      - name: Deploy to Production
        working-directory: worker
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          SALEOR_API_URL: ${{ secrets.SALEOR_API_URL }}
          SALEOR_TOKEN: ${{ secrets.SALEOR_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: npx wrangler deploy --env production

      - name: Verify Production Deployment
        run: |
          # Wait for deployment to propagate
          sleep 5
          # Test production endpoint (replace with actual URL)
          curl -f https://tma-graphql-worker-prod.workers.dev/graphql \
            -H "Content-Type: application/json" \
            -H "X-Telegram-Init-Data: auth_date=1700000000&hash=test&user={\"id\":\"123\"}" \
            -d '{"query":"{ restaurants { id name } }"}' \
            || echo "Production deployment verification skipped"

# ============================================================
# Phase 9 Notes: CI/CD Pipeline
# ============================================================
#
# Pipeline stages:
# 1. Lint & Type Check - Validates TypeScript and build
# 2. Unit Tests - Runs vitest test suite
# 3. Contract Tests - Tests against local worker
# 4. Deploy Staging - Deploys to staging environment
# 5. Deploy Production - Manual approval required
#
# Secrets required (set in GitHub repo):
# - CF_ACCOUNT_ID: Cloudflare account ID
# - CF_API_TOKEN: Cloudflare API token
# - SALEOR_API_URL: Saleor GraphQL endpoint
# - SALEOR_TOKEN: Saleor API token
# - TELEGRAM_BOT_TOKEN: Telegram bot token
#
# Environments:
# - staging: Automatic deployment on main push
# - production: Manual approval required
#
# See: task/phase-9-improve-code.md
# ============================================================
